name: Build & Deploy

on:
  # allows manual runs of the workflow
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_REPORT_ARTIFACT: coverage-report-artifact
  FUNCTION_APP_NAME: ct-az-function-app-nodejs-starter
  FUNCTION_APP_PATH: .
  FUNCTION_APP_SKU: flexconsumption
  FUNCTION_APP_SLOT_NAME: Production
  NODE_VERSION: ${{ vars.NODE_VERSION}}
  PAGES_ARTIFACT_NAME: gh-pages-artifact

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    environment: production

    steps:
      - name: 👷 Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🏗️ Setup Node.js ${{ env.NODE_VERSION }} environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          check-latest: true

      - name: ⚡  Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache
        with:
          path: ${{ env.FUNCTION_APP_PATH }}/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: ⬆️ Update npm, install global and project dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: npm i -g npm rimraf typescript && npm install

      - name: ✅ Run unit tests and linter
        run: npm test

      - name: 📦 Create and upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.COVERAGE_REPORT_ARTIFACT }}
          path: "./coverage"
          retention-days: 1

      - name: ⚙️ Build function app
        run: npm run build

      - name: 🛫 Deploy function app to Azure
        uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1.5.6
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ${{ env.FUNCTION_APP_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          sku: ${{ env.FUNCTION_APP_SKU }}
          slot-name: ${{ env.FUNCTION_APP_SLOT_NAME }}

  publish-coverage-report:
    runs-on: ubuntu-latest
    needs: build-and-deploy

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📦 Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.COVERAGE_REPORT_ARTIFACT }}

      - name: 🏗️ Setup GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Create and upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: .
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          retention-days: 1

      - name: 🚀 Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
